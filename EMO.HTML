<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيمو المتطور</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* شاشة الروبوت */
        #emo-screen {
            width: 300px; height: 200px; background: #000; border: 6px solid #222; border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center; position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1); transition: 0.3s;
        }

        .eye { width: 55px; height: 75px; background: #00ffff; border-radius: 12px; box-shadow: 0 0 20px #00ffff; transition: 0.1s; }
        
        #hat { position: absolute; top: -45px; font-size: 70px; display: none; }

        #debug { position: fixed; bottom: 10px; font-size: 10px; color: #555; width: 90%; text-align: center; }
        
        button { padding: 15px 30px; font-size: 18px; background: #00ffff; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,255,255,0.4); }
        
        .dizzy { animation: spin 0.4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #camera-feed { position: absolute; width: 60px; height: 45px; bottom: 10px; left: 10px; border-radius: 5px; opacity: 0.5; border: 1px solid #333; }
    </style>
</head>
<body>

    <button id="mainBtn">تشغيل إيمو الآن 🤖</button>

    <div id="emo-screen">
        <div id="hat">🎩</div>
        <div id="eye-l" class="eye"></div>
        <div id="eye-r" class="eye"></div>
        <video id="camera-feed" autoplay muted playsinline></video>
    </div>

    <div id="debug">الحالة: بانتظار أمر التشغيل...</div>

    <script>
        const eyeL = document.getElementById('eye-l');
        const eyeR = document.getElementById('eye-r');
        const debug = document.getElementById('debug');
        const hat = document.getElementById('hat');
        const video = document.getElementById('camera-feed');
        let modelLoaded = false;
        let model;

        // وظيفة التحدث
        function speak(text, rate = 1) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-US';
            speech.rate = rate;
            window.speechSynthesis.speak(speech);
        }

        // بدء الروبوت
        document.getElementById('mainBtn').onclick = async function() {
            this.style.display = 'none';
            debug.innerText = "جاري طلب الصلاحيات وتحميل المخ...";
            
            try {
                // 1. تشغيل الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                debug.innerText = "الكاميرا تعمل. جاري تحميل الذكاء الاصطناعي...";

                // 2. تشغيل التعرف على الصوت
                startVoice();

                // 3. تحميل موديل الرؤية (بدون حجب الكود)
                cocoSsd.load().then(m => {
                    model = m;
                    modelLoaded = true;
                    debug.innerText = "إيمو جاهز تماماً! قل 'Say my name' أو 'Sing'";
                    detectLoop();
                });

                // 4. حساس الهز
                startMotion();

            } catch (err) {
                debug.innerText = "خطأ: تأكد من استخدام HTTPS ومنح صلاحية الكاميرا.";
                console.error(err);
            }
        };

        // رصد الهز (الدوخان)
        function startMotion() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission();
            }
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (Math.abs(acc.x) > 18 || Math.abs(acc.y) > 18) {
                    eyeL.classList.add('dizzy');
                    eyeR.classList.add('dizzy');
                    debug.innerText = "إيمو يدووووخ! 😵";
                    setTimeout(() => {
                        eyeL.classList.remove('dizzy');
                        eyeR.classList.remove('dizzy');
                    }, 2000);
                }
            });
        }

        // التعرف على الكلام
        function startVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.lang = 'en-US';
            rec.continuous = true;
            rec.onresult = (e) => {
                const phrase = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if (phrase.includes("say my name")) {
                    hat.style.display = 'block';
                    speak("You are Heisenberg... You're god damn right!", 0.7);
                    setTimeout(() => hat.style.display = 'none', 4000);
                }
                if (phrase.includes("sing")) {
                    speak("I am a robot, and I am singing for you, la la la!", 1.2);
                    eyeL.style.height = "40px"; eyeR.style.height = "40px";
                    setTimeout(() => { eyeL.style.height = "75px"; eyeR.style.height = "75px"; }, 3000);
                }
            };
            rec.start();
        }

        // حلقة الرؤية (الخوف من المسدس)
        async function detectLoop() {
            if (!modelLoaded) return;
            const predictions = await model.detect(video);
            
            // البحث عن أي شيء يشبه السلاح أو الجوال الموجه
            const fearObjects = ["cell phone", "scissors", "remote", "gun"];
            const found = predictions.find(p => fearObjects.includes(p.class));

            if (found) {
                eyeL.style.height = "15px"; eyeR.style.height = "15px";
                document.getElementById('emo-screen').style.transform = "scale(0.9) translateY(10px)";
                debug.innerText = "إيمو خائف من: " + found.class;
            } else {
                eyeL.style.height = "75px"; eyeR.style.height = "75px";
                document.getElementById('emo-screen').style.transform = "scale(1)";
            }
            requestAnimationFrame(detectLoop);
        }
    </script>
</body>
</html>
